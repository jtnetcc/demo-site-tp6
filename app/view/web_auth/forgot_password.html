{layout name="layout/base" /}
<section class="auth-shell">
    <div class="auth-aside"><p class="page-kicker">PASSWORD RECOVERY</p><h1>找回登录密码</h1><p class="muted">选择邮箱或手机找回方式，系统会发送重置链接或验证码。</p></div>
    <div class="card auth-card">
        <h1>找回密码</h1>
        {if condition="!$channels.enabled"}
        <div class="flash err" role="alert"><div><strong>提示</strong><span>找回密码功能暂未开启，请联系管理员处理。</span></div></div>
        {else /}
        <form method="post" action="/forgot-password">
            <input type="hidden" name="_csrf" value="{$webCsrfToken|default=''}">
            <label>邮箱或手机号</label>
            <input name="account" required autocomplete="username" placeholder="请输入已绑定的邮箱或手机号">
            <label>找回方式</label>
            <select name="channel" required>
                {if condition="$channels.email"}<option value="email">邮箱找回</option>{/if}
                {if condition="$channels.phone"}<option value="phone">手机验证码找回</option>{/if}
            </select>
            <p class="muted">提交后如果账号信息存在，我们会发送重置说明。</p>
            <div class="section"><button class="button" type="submit">发送重置说明</button></div>
        </form>
        {/if}
        <p class="muted">想起密码了？<a href="/login">返回登录</a></p>
    </div>
</section>

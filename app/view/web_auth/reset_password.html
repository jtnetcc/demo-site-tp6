{layout name="layout/base" /}
<section class="auth-shell">
    <div class="auth-aside"><p class="page-kicker">RESET PASSWORD</p><h1>设置新密码</h1><p class="muted">邮箱链接或手机验证码验证通过后，即可设置新的登录密码。</p></div>
    <div class="card auth-card">
        <h1>重置密码</h1>
        <form method="post" action="/reset-password">
            <input type="hidden" name="_csrf" value="{$webCsrfToken|default=''}">
            {if condition="$selector && $token"}
            <input type="hidden" name="selector" value="{$selector|default=''}">
            <input type="hidden" name="token" value="{$token|default=''}">
            <p class="muted">正在使用邮箱重置链接，请输入新密码。</p>
            {else /}
            <input type="hidden" name="channel" value="phone">
            <label>手机号</label>
            <input name="account" value="{$account|default=''}" required autocomplete="tel">
            <label>短信验证码</label>
            <input name="code" required inputmode="numeric" autocomplete="one-time-code">
            {/if}
            <label>新密码</label>
            <input name="password" type="password" required autocomplete="new-password">
            <label>确认新密码</label>
            <input name="password_confirm" type="password" required autocomplete="new-password">
            <div class="section"><button class="button" type="submit">重置密码</button></div>
        </form>
        <p class="muted">还没有验证码？<a href="/forgot-password">重新获取</a></p>
    </div>
</section>

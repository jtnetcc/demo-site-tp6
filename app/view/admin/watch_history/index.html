{layout name="admin/layout" /}
<section class="card"><form class="filter" method="get" action="/admin/watch-history"><select name="user_id" data-current="{$filters.user_id|default=''}"><option value="">全部用户</option>{volist name="users" id="user"}<option value="{$user.id}">{$user.username}</option>{/volist}</select><select name="video_id" data-current="{$filters.video_id|default=''}"><option value="">全部视频</option>{volist name="videos" id="video"}<option value="{$video.id}">{$video.title}</option>{/volist}</select><button type="submit">筛选</button><a class="btn secondary" href="/admin/watch-history/create">新增记录</a></form></section>
<section class="card"><table class="table"><tr><th>编号</th><th>用户</th><th>视频</th><th>观看时间</th><th>进度</th><th>操作</th></tr>{volist name="histories" id="history" empty="<tr><td colspan='6'>暂无记录</td></tr>"}<tr><td>{$history.id}</td><td>{$history.user.username|default=''}</td><td>{$history.video.title|default=''}</td><td>{$history.watched_at}</td><td>{$history.progress_sec} 秒</td><td class="actions"><a class="btn secondary" href="/admin/watch-history/{$history.id}/edit">编辑</a><form class="inline-form" method="post" action="/admin/watch-history/{$history.id}/delete">{include file="admin/partials/csrf" /}<button class="danger" type="submit">删除</button></form></td></tr>{/volist}</table></section>
<section>{$histories|raw}</section>

{layout name="admin/layout" /}
<section class="card"><form method="post" action="{$action}">{include file="admin/partials/csrf" /}<label>用户</label><select name="user_id" data-current="{$history.user_id|default=''}" required>{volist name="users" id="user"}<option value="{$user.id}">{$user.username} / {$user.display_name}</option>{/volist}</select><label>视频</label><select name="video_id" data-current="{$history.video_id|default=''}" required>{volist name="videos" id="video"}<option value="{$video.id}">{$video.title}</option>{/volist}</select><div class="form-grid"><div><label>观看时间</label><input name="watched_at" value="{$history.watched_at|default=''}" placeholder="年-月-日 时:分:秒"></div><div><label>最后位置秒数</label><input type="number" name="last_position_sec" value="{$history.last_position_sec|default=0}"></div><div><label>进度秒数</label><input type="number" name="progress_sec" value="{$history.progress_sec|default=0}"></div></div><p class="actions"><button type="submit">保存</button><a class="btn secondary" href="/admin/watch-history">返回</a></p></form></section>

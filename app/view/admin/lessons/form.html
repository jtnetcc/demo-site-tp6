{layout name="admin/layout" /}
<section class="card"><form method="post" action="{$action}">{include file="admin/partials/csrf" /}<label>所属课程</label><select name="course_id" data-current="{$lesson.course_id|default=''}" required>{volist name="courses" id="course"}<option value="{$course.id}">{$course.title}</option>{/volist}</select><label>标题</label><input name="title" value="{$lesson.title|default=''}" required><label>摘要</label><textarea name="summary">{$lesson.summary|default=''}</textarea><label>视频地址（本地路径 / HTTP 直链 / 网盘直链）</label><input name="video_object_key" value="{$lesson.video_object_key|default=''}">{if condition="$lesson"}<p class="actions"><a class="btn secondary" href="/admin/import-tasks/create?lesson_id={$lesson.id}&course_id={$lesson.course_id}&kind=VIDEO">上传课时视频</a></p>{/if}<div class="form-grid"><div><label>时长秒数</label><input type="number" name="duration_sec" value="{$lesson.duration_sec|default=0}"></div><div><label>排序</label><input type="number" name="sort_order" value="{$lesson.sort_order|default=1}"></div><div><label>状态</label><select name="status" data-current="{$lesson.status|default='DRAFT'}"><option value="DRAFT">草稿</option><option value="PUBLISHED">已发布</option></select></div></div><p class="actions"><button type="submit">保存</button><a class="btn secondary" href="/admin/lessons">返回</a></p></form></section>

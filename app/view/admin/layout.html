<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{$title|default='后台管理'} - 在线学习平台</title>
    <style>
        *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f1f5f9;color:#0f172a}.admin-shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.admin-nav{background:#0f172a;color:#e2e8f0;padding:26px 18px;overflow:auto}.admin-nav a{display:block;color:#cbd5e1;text-decoration:none;padding:11px 14px;border-radius:12px;margin:4px 0}.admin-nav a:hover,.admin-nav a.active{background:#1e293b;color:#fff}.admin-brand{font-weight:800;color:#fff!important;margin:0 0 26px;font-size:20px;background:transparent!important;padding:0 14px!important}.nav-section{margin:24px 0}.nav-heading{font-size:13px;color:#94a3b8;letter-spacing:.08em;margin:0 14px 10px}.admin-main{padding:24px;min-width:0}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:18px;box-shadow:0 10px 24px rgba(15,23,42,.04);margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}.stat{font-size:30px;font-weight:800}.muted{color:#64748b}.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.btn,button{display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:9px;background:#2563eb;color:#fff!important;padding:9px 12px;text-decoration:none;cursor:pointer;font:inherit}.btn.secondary,button.secondary{background:#e2e8f0;color:#0f172a!important}.btn.danger,button.danger{background:#dc2626}.table{width:100%;border-collapse:collapse;background:#fff}.table th,.table td{border-bottom:1px solid #e2e8f0;text-align:left;padding:10px;vertical-align:top}.table th{color:#475569;background:#f8fafc;font-size:13px}input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:9px;padding:10px;font:inherit;background:#fff}textarea{min-height:110px}label{display:block;font-weight:650;margin:12px 0 6px}.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}.filter{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;align-items:end}.flash{padding:12px 14px;border-radius:12px;margin-bottom:16px;transition:opacity .28s ease,transform .28s ease,margin .28s ease,padding .28s ease,max-height .28s ease;max-height:120px;overflow:hidden}.flash.ok{background:#dcfce7;color:#166534}.flash.err{background:#fee2e2;color:#991b1b}.flash.is-hiding{opacity:0;transform:translateY(-8px);margin-top:0;margin-bottom:0;padding-top:0;padding-bottom:0;max-height:0}.badge{display:inline-block;border-radius:999px;background:#e0ecff;color:#1d4ed8;padding:4px 9px;font-size:12px}.inline-form{display:inline}.checkboxes{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}.check{display:flex;gap:7px;align-items:center;font-weight:400}.check input{width:auto}.modal{display:none;position:fixed;inset:0;z-index:50}.modal.open{display:block}.modal-backdrop{position:absolute;inset:0;background:rgba(15,23,42,.58)}.modal-panel{position:relative;background:#fff;width:min(720px,calc(100vw - 32px));max-height:calc(100vh - 48px);overflow:auto;margin:24px auto;border-radius:18px;box-shadow:0 24px 70px rgba(15,23,42,.3)}.modal-lg .modal-panel{width:min(1040px,calc(100vw - 32px))}.modal-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px;border-bottom:1px solid #e2e8f0}.modal-title{font-size:18px;font-weight:800}.modal-body{padding:18px}.modal-close{background:#e2e8f0;color:#0f172a!important}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.tab-btn{background:#e2e8f0;color:#0f172a!important}.tab-btn.active{background:#2563eb;color:#fff!important}.tab-panel{display:none}.tab-panel.active{display:block}@media(max-width:800px){body{overflow-x:hidden}.admin-shell{grid-template-columns:1fr}.admin-nav{position:static;padding:16px;overflow:visible}.admin-brand{margin:0 0 14px;font-size:18px;padding:0!important}.nav-section{margin:14px 0}.nav-heading{margin:0 0 8px;font-size:12px}.admin-nav a{display:inline-flex;margin:3px 3px 3px 0;padding:8px 10px;font-size:14px;border-radius:999px}.admin-main{padding:14px;min-width:0}.topbar{align-items:stretch;flex-direction:column;gap:10px;margin-bottom:14px}.topbar h1{margin:0;font-size:24px;line-height:1.2}.actions{align-items:stretch}.actions form{margin:0}.actions .btn,.actions button{min-height:42px}.topbar .actions{display:grid;grid-template-columns:1fr 1fr}.topbar .actions .btn,.topbar .actions form,.topbar .actions button{width:100%}.card{padding:14px;border-radius:12px;margin-bottom:14px}.grid{grid-template-columns:1fr}.form-grid,.filter{grid-template-columns:1fr}.table{display:block;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #e2e8f0;border-radius:12px}.table th,.table td{min-width:112px;padding:9px 8px;white-space:nowrap}.table td:last-child{min-width:180px}.inline-form{display:inline-flex}.checkboxes{grid-template-columns:1fr 1fr}.tabs{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}.tab-btn{white-space:nowrap;flex:0 0 auto}.modal-panel,.modal-lg .modal-panel{width:calc(100vw - 20px);max-height:calc(100vh - 20px);margin:10px auto;border-radius:14px}.modal-header{padding:14px}.modal-body{padding:14px}.modal-body .actions{display:grid;grid-template-columns:1fr}.modal-body .actions .btn,.modal-body .actions button{width:100%}}@media(max-width:420px){.admin-main{padding:10px}.topbar .actions{grid-template-columns:1fr}.actions{display:grid;grid-template-columns:1fr}.actions .btn,.actions button{width:100%;min-height:42px}.checkboxes{grid-template-columns:1fr}.table th,.table td{font-size:13px;min-width:104px}.modal-panel,.modal-lg .modal-panel{width:calc(100vw - 12px);max-height:calc(100vh - 12px);margin:6px auto}}
    </style>
</head>
<body>
<div class="admin-shell">
    {include file="admin/partials/nav" /}
    <main class="admin-main">
        <div class="topbar"><div><h1>{$title|default='后台管理'}</h1></div><div class="actions"><a class="btn secondary" href="/">返回前台</a><form method="post" action="/logout"><input type="hidden" name="_csrf" value="{$webCsrfToken|default=''}"><button class="secondary" type="submit">退出</button></form></div></div>
        {include file="admin/partials/flash" /}
        {__CONTENT__}
    </main>
</div>
<script>
var adminCsrfToken = '{$adminCsrfToken|default=""}';
{literal}
document.querySelectorAll('.flash').forEach(function(el){setTimeout(function(){el.classList.add('is-hiding');setTimeout(function(){el.remove();},320);},3000);});
document.querySelectorAll('select[data-current]').forEach(function(select){var value=select.getAttribute('data-current');if(value!==null){select.value=value;}});
var adminEnumLabels={NORMAL:'普通',VIP:'会员',SVIP:'超级会员',DRAFT:'草稿',PUBLISHED:'已发布',OFFLINE:'已下线',ACTIVE:'正常',DISABLED:'已禁用',PENDING:'待处理',PROCESSING:'处理中',DONE:'已完成',FAILED:'失败',ADMIN:'管理员',USER:'普通用户',VIDEO:'视频',COVER:'封面'};
document.querySelectorAll('option,.table td,.badge,.tag').forEach(function(el){var text=el.textContent.trim();if(adminEnumLabels[text]){el.textContent=adminEnumLabels[text];}});
document.querySelectorAll('.admin-nav a').forEach(function(link){var path=location.pathname.replace(/\/$/,'')||'/admin';var exact=link.getAttribute('data-nav-path');var prefix=link.getAttribute('data-nav-prefix');if((exact&&path===exact)||(prefix&&path.indexOf(prefix)===0)){link.classList.add('active');}});
document.querySelectorAll('form[method="post"],form[method="POST"]').forEach(function(form){if(adminCsrfToken&&!form.querySelector('input[name="_csrf"]')){var input=document.createElement('input');input.type='hidden';input.name='_csrf';input.value=adminCsrfToken;form.appendChild(input);}if(form.querySelector('.danger')&&!form.dataset.confirmBound){form.dataset.confirmBound='1';form.addEventListener('submit',function(event){if(!confirm('确认执行此操作吗？')){event.preventDefault();}});}});
document.querySelectorAll('[data-modal-target]').forEach(function(trigger){trigger.addEventListener('click',function(event){event.preventDefault();var modal=document.querySelector(trigger.getAttribute('data-modal-target'));if(modal){modal.classList.add('open');modal.setAttribute('aria-hidden','false');}});});
document.querySelectorAll('[data-modal-close],.modal-backdrop').forEach(function(trigger){trigger.addEventListener('click',function(){var modal=trigger.closest('.modal');if(modal){modal.classList.remove('open');modal.setAttribute('aria-hidden','true');}});});
document.addEventListener('keydown',function(event){if(event.key==='Escape'){document.querySelectorAll('.modal.open').forEach(function(modal){modal.classList.remove('open');modal.setAttribute('aria-hidden','true');});}});
document.querySelectorAll('[data-tab-target]').forEach(function(button){button.addEventListener('click',function(event){event.preventDefault();var wrap=button.closest('[data-tabs]')||document;wrap.querySelectorAll('[data-tab-target]').forEach(function(btn){btn.classList.remove('active');});wrap.querySelectorAll('.tab-panel').forEach(function(panel){panel.classList.remove('active');});button.classList.add('active');var panel=wrap.querySelector(button.getAttribute('data-tab-target'));if(panel){panel.classList.add('active');}});});
document.querySelectorAll('[data-selected-tags]').forEach(function(block){var selected=(block.dataset.selectedTags||'');var scope=block.closest('.modal')||document;if(selected){selected.split(',').forEach(function(id){var checkbox=scope.querySelector('input[name="tag_ids[]"][value="'+id+'"]');if(checkbox){checkbox.checked=true;}});}});
document.querySelectorAll('input[name="video_file"]').forEach(function(input){input.addEventListener('change',function(){var file=input.files&&input.files[0];if(!file){return;}var form=input.closest('form');if(!form){return;}var originalName=form.querySelector('input[name="original_name"]');var mimeType=form.querySelector('input[name="mime_type"]');var sizeBytes=form.querySelector('input[name="size_bytes"]');var durationSec=form.querySelector('input[name="duration_sec"]');if(originalName){originalName.value=file.name;}if(mimeType&&file.type){mimeType.value=file.type;}if(sizeBytes){sizeBytes.value=file.size||0;}if(durationSec){durationSec.value='';var video=document.createElement('video');video.preload='metadata';video.onloadedmetadata=function(){URL.revokeObjectURL(video.src);if(isFinite(video.duration)){durationSec.value=Math.ceil(video.duration);}};video.onerror=function(){URL.revokeObjectURL(video.src);};video.src=URL.createObjectURL(file);}});});
{/literal}
</script>
</body>
</html>

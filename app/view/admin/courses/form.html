{layout name="admin/layout" /}
<section class="card"><form method="post" action="{$action}">{include file="admin/partials/csrf" /}<label>标题</label><input name="title" value="{$course.title|default=''}" required><label>简介</label><textarea name="description">{$course.description|default=''}</textarea><label>封面链接（本地 / HTTP / 网盘）</label><input name="cover_url" value="{$course.cover_url|default=''}"><div class="form-grid"><div><label>所需等级</label><select name="required_level" data-current="{$course.required_level|default=''}"><option value="">不限</option><option value="NORMAL">普通</option><option value="VIP">会员</option><option value="SVIP">超级会员</option></select></div><div><label>状态</label><select name="status" data-current="{$course.status|default='DRAFT'}"><option value="DRAFT">草稿</option><option value="PUBLISHED">已发布</option></select></div></div><p class="actions"><button type="submit">保存</button><a class="btn secondary" href="/admin/courses">返回</a></p></form></section>

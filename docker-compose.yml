services:
  nginx:
    image: nginx:alpine
    container_name: tp6-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - lnmp-network

  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: tp6-php
    command: sh -c "mkdir -p runtime/cache runtime/log runtime/session runtime/temp public/uploads/videos public/uploads/covers && chown www-data:www-data /var/www/html && chown -R www-data:www-data runtime public/uploads && php-fpm"
    volumes:
      - ./:/var/www/html
      - ./php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    depends_on:
      - mysql
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=tp6_demo
      - DB_USERNAME=tp6_user
      - DB_PASSWORD=tp6_pass
    networks:
      - lnmp-network

  mysql:
    image: mysql:8.0
    container_name: tp6-mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: tp6_demo
      MYSQL_USER: tp6_user
      MYSQL_PASSWORD: tp6_pass
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - lnmp-network

networks:
  lnmp-network:
    driver: bridge

volumes:
  mysql-data: